<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">📝 简易博客</a>
  <div class="nav-links" id="navLinks"></div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>🔐 登录</h2>
    <div id="alertBox" class="alert"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">登 录</button>
    </form>
    <div class="auth-switch">
      还没有账号？<a href="/register.html">立即注册 →</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/main.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert('alertBox');

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const data = await post('/auth/login', { username, password });
    saveAuth(data.token, data.user);
    showAlert('alertBox', '登录成功，正在跳转...', 'success');
    setTimeout(() => { window.location.href = '/'; }, 500);
  } catch (err) {
    showAlert('alertBox', err.message, 'error');
  }
});
</script>
</body>
</html>
