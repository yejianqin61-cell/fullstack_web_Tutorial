<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">📝 简易博客</a>
  <div class="nav-links" id="navLinks"></div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>📋 注册</h2>
    <div id="alertBox" class="alert"></div>
    <form id="registerForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="2-20个字符" required minlength="2" maxlength="20" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="4-50个字符" required minlength="4" maxlength="50" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" placeholder="请再次输入密码" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">注 册</button>
    </form>
    <div class="auth-switch">
      已有账号？<a href="/login.html">立即登录 →</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/main.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert('alertBox');

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    showAlert('alertBox', '两次输入的密码不一致', 'error');
    return;
  }

  try {
    await post('/auth/register', { username, password });
    showAlert('alertBox', '注册成功！正在跳转到登录页...', 'success');
    setTimeout(() => { window.location.href = '/login.html'; }, 800);
  } catch (err) {
    showAlert('alertBox', err.message, 'error');
  }
});
</script>
</body>
</html>
